name: 代码检查
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:  
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: |
          pnpm config set ignore-scripts true
          pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm type-check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true

      - name: Install dependencies
        run: | 
          pnpm config set ignore-scripts true
          pnpm install --frozen-lockfile

      - name: Build project
        run: |
          pnpm build
          pnpm build:wx